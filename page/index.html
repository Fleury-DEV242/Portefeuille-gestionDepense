<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfeuille - Gestion depenses</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <main id="container">
      <!--Ecran d'accueil-->
      <div id="ecran-accueil" class="ecran">
        <!-- Espace Profil utilisateur -->
        <section id="espace-compte">
          <div id="nom-utilisateur">
            <h2>Fleury Taty</h2>
          </div>
          <div id="image-profil">
            <img
              src="../image/nano-banana-2_Améliore_cette_photo_de_portrait_pour_une_utilisation_en_photo_de_profil_profes-0.jpg"
              alt="photo de profil"
            />
          </div>
        </section>

        <!--Espace solde budget & depense-->
        <section id="espace-solde">
          <div class="solde-budget solde">
            <p>Solde budget</p>
            <h3>10.000 <span class="devise">FCFA</span></h3>
          </div>
          <div class="solde-depense solde">
            <p>Solde dépense</p>
            <h3>4.000 <span class="devise">FCFA</span></h3>
          </div>
        </section>

        <!-- Bouton pour ajouter un budget -->
        <div id="bouton-ajouter-budget">
          <button class="ajouter-budget">
            <p>Ajouter budget</p>
            <span class="fa-solid fa-plus"></span>
          </button>
        </div>

        <!-- Espace filtre depense & liste de toutes les depenses -->
        <section id="espace-depense">
          <div id="filtre-depense">
            <div class="filtres">
              <div id="bouton-filtre-content">
                <button class="bouton-filtre active" data-filtre="tous">
                  Tous
                </button>
                <button class="bouton-filtre" data-filtre="nourriture">
                  Nourriture
                </button>
                <button class="bouton-filtre" data-filtre="sante">Santé</button>
                <button class="bouton-filtre" data-filtre="loisirs">
                  Loisirs
                </button>
              </div>
            </div>
            <h3>Mes dépenses</h3>
          </div>

          <!-- Liste des depenses -->
          <div id="liste-depenses"></div>
        </section>
      </div>

      <!-- Ecran d'ajout d'une depense -->
      <div id="ecran-ajout-depense" class="ecran">
        <!-- Formulaire d'ajout de depense-->
        <section id="form-ajout-depense">
          <div class="input-nom-depense">
            <p>Nom dépense</p>
            <input type="text" id="nom-depense" placeholder="Resto le cactus" />
          </div>

          <div class="input-montant-depense">
            <p>Montant dépense</p>
            <input type="number" id="montant-depense" placeholder="4000" />
          </div>

          <div class="input-categories-depense">
            <p>Catégories dépense</p>

            <select id="options-categories-depense">
              <option value="Tous">Tous</option>
              <option value="Nourriture">Nourriture</option>
              <option value="Santé">Santé</option>
              <option value="Loisirs">Loisirs</option>
            </select>
          </div>

          <!--Bouton ajouter la depense -->
          <div id="bouton-ajouter">
            <button class="ajouter-depense">Ajouter depense</button>
          </div>
        </section>

        <!-- Espace du menu de navigation-->
        <nav id="barre-navigation">
          <div class="bouton-ecran-accueil">
            <i class="fa-solid fa-house"></i>
          </div>

          <div class="bouton-ecran-ajoutDepense">
            <ion-icon name="add-outline"></ion-icon>
          </div>

          <div class="bouton-ecran-statistique">
            <ion-icon name="stats-chart-outline"></ion-icon>
          </div>
        </nav>
      </div>
    </main>

    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
    <script type="module" src="../script/app.js"></script>
  </body>
</html>
